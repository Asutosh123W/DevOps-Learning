services:

  nginx:
    image: nginx
    container_name: nginx-proxy

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app1
      - app2

  app1:
    build: .
    container_name: flask-app1

    environment:
      CONTAINER_NAME: Flask-App-1
      DB_HOST: db
      DB_NAME: devopsdb
      DB_USER: admin
      DB_PASSWORD: password

    depends_on:
      - db

  app2:
    build: .
    container_name: flask-app2

    environment:
      CONTAINER_NAME: Flask-App-2
      DB_HOST: db
      DB_NAME: devopsdb
      DB_USER: admin
      DB_PASSWORD: password

    depends_on:
      - db

  db:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_DB: devopsdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
